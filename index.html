<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Price List</title>
    <style>
      @font-face {
        font-family: "MyCustomFont";
        src: url("./fonts/kingred.otf") format("truetype");
      }
      .font-dafont {
        font-family: "MyCustomFont", sans-serif;
      }
    </style>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="overflow-x-hidden">
    <header>
      <nav
        style="background-color: #750400"
        class="fixed top-0 shadow-md inset-x-0 z-20"
      >
        <div class="flex flex-auto my-2 text-center">
          <div class="hidden md:block my-4 mx-12 space-x-4">
            <a
              href="#home"
              class="hover:bg-white hover:text-red-900 text-white font-semibold px-2 py-1 rounded-xl"
              >Home</a
            >
            <a
              href="#price"
              class="hover:bg-white hover:text-red-900 text-white font-semibold px-2 py-1 rounded-xl"
              >Price List</a
            ><a
              href="#portofolio"
              class="hover:bg-white hover:text-red-900 text-white font-semibold px-2 py-1 rounded-xl"
              >Design</a
            >

            <a
              href="#tc"
              class="hover:bg-white hover:text-red-900 text-white font-semibold px-2 py-1 rounded-xl"
              >T&C</a
            >
          </div>

          <div class="md:hidden flex justify-end mx-6">
            <button class="outline-none mobile-menu-button" id="toggleBtn">
              <svg
                style="color: white"
                class="w-6 h-6 hover:text-yellow-300"
                x-show="!showMenu"
                fill="none"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path d="M4 6h16M4 12h16M4 18h16"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="hidden md:hidden mobile-menu" id="hiddenText">
          <ul class="my-2">
            <li class="active">
              <a
                href="#"
                class="block px-5 py-4 font-semibold text-white hover:bg-white hover:text-red-900"
                >Home</a
              >
            </li>

            <li>
              <a
                href="#price"
                class="block px-5 py-4 font-semibold text-white hover:bg-white hover:text-red-900"
                >Price List</a
              >
            </li>
            <li>
              <a
                href="#portofolio"
                class="block px-5 py-4 font-semibold text-white hover:bg-white hover:text-red-900"
                >Design</a
              >
            </li>
            <li>
              <a
                href="#tc"
                class="block px-5 py-4 font-semibold text-white hover:bg-white hover:text-red-900"
                >T&C</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <div id="price" class="relative min-h-screen bg-[#750400]">
      <!-- Halaman 1 -->

      <div class="min-h-screen flex flex-col justify-center">
        <h2 class="text-center text-white text-3xl md:text-5xl font-bold">
          Price List
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 px-5 md:px-20 mt-10">
          <div class="text-center">
            <img src="foto/j.jpg" class="w-full rounded-lg" />

            <p class="text-white mt-3">Regular Board</p>

            <a
              href="https://wa.me/6289620361392"
              class="block bg-white text-red-900 py-2 mt-3 rounded-full font-bold"
            >
              Order Now
            </a>
          </div>

          <div class="text-center">
            <img src="foto/1.jpg" class="w-full rounded-lg" />

            <p class="text-white mt-3">Hanging Board</p>

            <a
              href="https://wa.me/6289620361392"
              class="block bg-white text-red-900 py-2 mt-3 rounded-full font-bold"
            >
              Order Now
            </a>
          </div>
        </div>
      </div>
    
    </div>
    <footer
      class="fixed bottom-0 w-full inset-x-0 z-20 flex justify-center h-6 md:h-12"
      style="background-color: #750400; color: white"
    >
      <div class="flex items-center mx-1 md:mx-10">
        <img src="foto/ig.png" class="mx-1 w-4 h-4 md:w-6 md:h-6" />
        <span class="font-medium">neir.florist</span>
      </div>
      <div class="flex items-center mx-1 md:mx-10">
        <img src="foto/wa.png" class="mx-1 w-4 h-4 md:w-6 md:h-6" />
        <span class="font-medium">089620361392</span>
      </div>
    </footer>
    <script>
      var toggleBtn = document.getElementById("toggleBtn");
      var hiddenText = document.getElementById("hiddenText");
      toggleBtn.addEventListener("click", function () {
        if (hiddenText.classList.contains("hidden")) {
          hiddenText.classList.remove("hidden");
        } else {
          hiddenText.classList.add("hidden");
        }
      });
      mobileMenu.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          mobileMenu.classList.add("hidden");
        });
      });
    </script>
  </body>
</html>
